<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gem1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="100%" stop-color="#FF5252"/>
    </linearGradient>
    <linearGradient id="gem2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FFC400"/>
    </linearGradient>
    <linearGradient id="gem3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
    <linearGradient id="gem4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#0091EA"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- 四个彩色棋子代表消消乐 -->
  <rect x="100" y="100" width="130" height="130" rx="28" fill="url(#gem1)" opacity="0.95"/>
  <rect x="108" y="108" width="114" height="114" rx="22" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <!-- 高光 -->
  <rect x="108" y="108" width="114" height="50" rx="22" fill="rgba(255,255,255,0.25)"/>

  <rect x="270" y="100" width="130" height="130" rx="28" fill="url(#gem2)" opacity="0.95"/>
  <rect x="278" y="108" width="114" height="114" rx="22" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <rect x="278" y="108" width="114" height="50" rx="22" fill="rgba(255,255,255,0.25)"/>

  <rect x="100" y="270" width="130" height="130" rx="28" fill="url(#gem3)" opacity="0.95"/>
  <rect x="108" y="278" width="114" height="114" rx="22" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <rect x="108" y="278" width="114" height="50" rx="22" fill="rgba(255,255,255,0.25)"/>

  <rect x="270" y="270" width="130" height="130" rx="28" fill="url(#gem4)" opacity="0.95"/>
  <rect x="278" y="278" width="114" height="114" rx="22" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <rect x="278" y="278" width="114" height="50" rx="22" fill="rgba(255,255,255,0.25)"/>

  <!-- 闪光粒子 -->
  <circle cx="160" cy="380" r="6" fill="white" opacity="0.8"/>
  <circle cx="350" cy="150" r="5" fill="white" opacity="0.7"/>
  <circle cx="140" cy="140" r="4" fill="white" opacity="0.9"/>
  <circle cx="370" cy="370" r="7" fill="white" opacity="0.6"/>
</svg>
